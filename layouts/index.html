{{ define "main" }}
<ul class="article-list">
  {{ range .Site.RegularPages.ByPublishDate.Reverse }}
  {{- $pub := or .PublishDate .Date -}}
  {{- $pubJST := time.In "Asia/Tokyo" $pub -}}
  <li class="article-item">
    <div class="article-date">{{ time.Format "2006-01-02 15:04" $pubJST }}</div>
    <div class="article-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
  </li>
  {{ end }}
</ul>
{{ end }}
