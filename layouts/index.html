<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ .Site.Title }}</title>
<body>
<section>
  <h1>{{ .Site.Title }}</h1>
  <ul>
    {{ range .Site.RegularPages.ByPublishDate.Reverse }}
    {{- $pub := or .PublishDate .Date -}}
    {{- $pubJST := time.In "Asia/Tokyo" $pub -}}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <time datetime="{{ time.Format "2006-01-02T15:04:05Z07:00" $pubJST }}">
        {{ time.Format "2006-01-02" $pubJST }}
      </time>
    </li>
    {{ end }}
  </ul>
</section>
</body>
</html>
