<form action="https://docs.google.com/forms/d/e/{{ $cfg.form.id }}/formResponse"
      method="POST" target="_blank" class="comment-form"
      style="margin-top:1em;">

  <input type="hidden" name="entry.{{ $cfg.form.slugEntry }}" value="{{ .File.BaseFileName }}">

  <!-- 名前入力欄 -->
  <p style="margin:0.5em 0;">
    <input type="text"
           name="entry.{{ $cfg.form.nameEntry }}"
           placeholder="名前" required
           style="display:block; width:100%; box-sizing:border-box;"/>
  </p>

  <!-- 本文入力欄 -->
  <p style="margin:0.5em 0;">
    <textarea name="entry.{{ $cfg.form.bodyEntry }}"
              placeholder="本文" rows="4" required
              style="display:block; width:100%; box-sizing:border-box;"></textarea>
  </p>

  <!-- 送信ボタン（左端揃え・小さめ） -->
  <p style="margin:0.5em 0;">
    <button type="submit"
            style="display:inline-block; padding:0.4em 1em; font-size:0.9em;">
      送信
    </button>
  </p>
</form>
