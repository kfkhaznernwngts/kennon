{{ define "main" }}
<article class="single-page">
  <h1>{{ .Title }}</h1>

  <div class="content">
    {{ .Content }}
  </div>

  <!-- 公開日・更新日をコメントセクション直前へ移動 -->
  <div class="post-meta">
    公開日: {{ .Date.Format "2006-01-02" }}
    {{ with .Lastmod }}
      （更新日: {{ .Format "2006-01-02" }}）
    {{ end }}
  </div>

  {{ partial "comments.html" . }}

  <nav class="post-pager">
    <div class="prev-post">
      {{ if .PrevInSection }}
        <a href="{{ .PrevInSection.RelPermalink }}">←</a>
      {{ else }}
        <span class="placeholder"></span>
      {{ end }}
    </div>
    <div class="next-post">
      {{ if .NextInSection }}
        <a href="{{ .NextInSection.RelPermalink }}">→</a>
      {{ else }}
        <span class="placeholder"></span>
      {{ end }}
    </div>
  </nav>
</article>
{{ end }}
