{{ define "main" }}
<article class="single-page">
  <h1>{{ .Title }}</h1>

  <div class="post-meta">
    公開日: {{ .Date.Format "2006-01-02" }}
    {{ with .Lastmod }}
      （更新日: {{ .Format "2006-01-02" }}）
    {{ end }}
  </div>

  <div class="content">
    {{ .Content }}
  </div>

  {{ partial "comments.html" . }}

  <nav class="post-pager">
    <div class="prev-post">
      {{ with .PrevInSection }}
        <a href="{{ .RelPermalink }}">←</a>
      {{ end }}
    </div>
    <div class="next-post">
      {{ with .NextInSection }}
        <a href="{{ .RelPermalink }}">→</a>
      {{ end }}
    </div>
  </nav>
</article>
{{ end }}
