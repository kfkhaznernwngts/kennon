{{ define "main" }}
<article class="single-page">
  <h1>{{ .Title }}</h1>

  <div class="post-meta">
    公開日: {{ .Date.Format "2006-01-02" }}
    {{ with .Lastmod }}
      （更新日: {{ .Format "2006-01-02" }}）
    {{ end }}
  </div>

  <div class="content">
    {{ .Content }}
  </div>

  {{< comments >}}
</article>
{{ end }}
