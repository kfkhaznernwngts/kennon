{{ define "main" }}
<article>
  <header>
    <h1>{{ .Title }}</h1>
    {{ $tz := time.LoadLocation "Asia/Tokyo" }}
    <p>
      公開日:
      <time datetime="{{ .PublishDate.In $tz | time.Format "2006-01-02T15:04:05Z07:00" }}">
        {{ .PublishDate.In $tz | time.Format "2006-01-02 15:04" }}
      </time><br>
      更新日:
      <time datetime="{{ .Lastmod.In $tz | time.Format "2006-01-02T15:04:05Z07:00" }}">
        {{ .Lastmod.In $tz | time.Format "2006-01-02 15:04" }}
      </time>
    </p>
  </header>

  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
