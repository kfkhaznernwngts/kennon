{{ define "main" }}
<article>
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>

  <div class="post-dates">
    <div>公開日: {{ .PublishDate.Format "2006/01/02 15:04" }}</div>
    <div>最終編集日: {{ .Lastmod.Format "2006/01/02 15:04" }}</div>
  </div>

  <div class="post-comments">
    {{ .RenderString "{{< comments >}}" }}
  </div>
</article>
{{ end }}
