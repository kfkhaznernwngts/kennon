{{ define "main" }}
<section>
  <h1>{{ .Title }}</h1>
  <ul>
    {{ range .Pages.ByPublishDate }}
    {{ $tz := time.LoadLocation "Asia/Tokyo" }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <time datetime="{{ .PublishDate.In $tz | time.Format "2006-01-02T15:04:05Z07:00" }}">
        {{ .PublishDate.In $tz | time.Format "2006-01-02" }}
      </time>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
