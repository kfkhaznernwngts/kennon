name: Hugo with publishDate

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.149.0'
          extended: true

      - name: Fill publishDate if missing
        run: |
          files=$(git ls-files content/posts/*.md)
          edited=0
          for f in $files; do
            if grep -q '^publishDate' "$f"; then
              continue
            fi

            raw_ts=$(git log --diff-filter=A --follow --format='%aI' -- "$f" | tail -n1)
            if [ -n "$raw_ts" ]; then
              first_ts=$(TZ=Asia/Tokyo date -d "$raw_ts" +"%Y-%m-%dT%H:%M:%S%:z")
            else
              first_ts=$(date +"%Y-%m-%dT%H:%M:%S%:z")
            fi

            if head -1 "$f" | grep -q '^---$'; then
              awk -v ts="$first_ts" 'NR==1{print;print "publishDate: " ts;next}1' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            elif head -1 "$f" | grep -q '^\+\+\+$'; then
              awk -v ts="$first_ts" 'NR==1{print;print "publishDate = \"" ts "\"";next}1' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            else
              printf -- '---\npublishDate: %s\n---\n%s\n' "$first_ts" "$(cat "$f")" > "$f.tmp" && mv "$f.tmp" "$f"
            fi

            echo "Set publishDate for $f to $first_ts"
            edited=1
          done

          if [ "$edited" -eq 1 ]; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add content/posts/*.md
            git commit -m "Add publishDate automatically" || true
            git push
          fi

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

