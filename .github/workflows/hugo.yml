name: Hugo with publishDate JST

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.149.0'
          extended: true

      - name: Normalize/Fill publishDate in JST
        run: |
          set -euo pipefail
          edited=0
          files=$(git ls-files 'content/post/**/*.md' 'content/posts/**/*.md' 2>/dev/null || true)

          for f in $files; do
            if [ ! -s "$f" ]; then
              continue
            fi

            raw_ts=$(git log --diff-filter=A --follow --format='%aI' -- "$f" | tail -n1 || true)
            if [ -n "$raw_ts" ]; then
              ts=$(TZ=Asia/Tokyo date -d "$raw_ts" +"%Y-%m-%dT%H:%M:%S%:z")
            else
              ts=$(date +"%Y-%m-%dT%H:%M:%S%:z")
            fi

            if head -1 "$f" | grep -q '^---$'; then
              if awk 'NR==1 && $0~/^---$/ {in=1; next} in && $0~/^---$/ {in=0} in && $0~/^publishDate[[:space:]]*:/ {found=1} END{exit !found}' "$f"; then
                awk -v ts="$ts" '
                  NR==1 && /^---$/ {in=1; print; next}
                  in && /^---$/ {in=0; print; next}
                  in && /^publishDate[[:space:]]*:/ {print "publishDate: \"" ts "\""; next}
                  {print}
                ' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
                edited=1
              else
                awk -v ts="$ts" '
                  NR==1 && /^---$/ {print; print "publishDate: \"" ts "\""; next}
                  {print}
                ' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
                edited=1
              fi

            elif head -1 "$f" | grep -q '^\+\+\+$'; then
              if awk 'NR==1 && $0~/^\+\+\+$/ {in=1; next} in && $0~/^\+\+\+$/ {in=0} in && $0~/^publishDate[[:space:]]*=/ {found=1} END{exit !found}' "$f"; then
                awk -v ts="$ts" '
                  NR==1 && /^\+\+\+$/ {in=1; print; next}
                  in && /^\+\+\+$/ {in=0; print; next}
                  in && /^publishDate[[:space:]]*=/ {print "publishDate = \"" ts "\""; next}
                  {print}
                ' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
                edited=1
              else
                awk -v ts="$ts" '
                  NR==1 && /^\+\+\+$/ {print; print "publishDate = \"" ts "\""; next}
                  {print}
                ' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
                edited=1
              fi

            else
              printf '---\npublishDate: "%s"\n---\n%s\n' "$ts" "$(cat "$f")" > "$f.tmp" && mv "$f.tmp" "$f"
              edited=1
            fi
          done

          if [ "$edited" -eq 1 ]; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add content/post/**/*.md content/posts/**/*.md || true
            git commit -m "normalize/fill publishDate (JST RFC3339)" || true
            git push
          fi

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
