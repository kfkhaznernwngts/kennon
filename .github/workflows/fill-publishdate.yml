      - name: Add publishDate to posts missing it
        shell: bash
        run: |
          set -euo pipefail
          files=$(git ls-files 'content/post/**/*.md' 'content/posts/**/*.md' 2>/dev/null || true)
          edited=0
          for f in $files; do
            if ! grep -q '^publishDate' "$f"; then
              first_ts=$(TZ=Asia/Tokyo git log --diff-filter=A --follow --format='%aI' -- "$f" | tail -n1)
              if [ -z "$first_ts" ]; then
                first_ts=$(date +"%Y-%m-%dT%H:%M:%S%:z")
              fi

              if head -1 "$f" | grep -q '^---$'; then
                # YAML frontmatter
                awk -v ts="$first_ts" 'NR==1{print;print "publishDate: " ts;next}1' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
              elif head -1 "$f" | grep -q '^\+\+\+$'; then
                # TOML frontmatter
                awk -v ts="$first_ts" 'NR==1{print;print "publishDate = \"" ts "\"";next}1' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
              else
                # No frontmatter
                printf -- '---\npublishDate: %s\n---\n%s\n' "$first_ts" "$(cat "$f")" > "$f.tmp" && mv "$f.tmp" "$f"
              fi

              echo "Set publishDate for $f to $first_ts"
              edited=1
            fi
          done

          if [ "$edited" -eq 0 ]; then
            echo "No files needed publishDate."
            exit 0
          fi

          git config user.name  "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add content
          git commit -m "chore: auto-fill publishDate for new posts"
          git push

